<!DOCTYPE html>
<html>
<head>
    <title>Employee Management</title>
</head>
<body>

<h2>Add Employee</h2>
<input id="id" placeholder="ID">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="mobile" placeholder="Mobile">
<input id="city" placeholder="City">
<input id="salary" placeholder="Salary">
<button onclick="addEmployee()">Add</button>

<h2>Search</h2>
<input id="searchName" placeholder="Search by name">
<button onclick="searchByName()">Search</button>

<input id="searchCity" placeholder="Search by city">
<button onclick="searchByCity()">Search</button>

<h2>Sort</h2>
<button onclick="sortAsc()">Sort Salary Asc</button>
<button onclick="sortDesc()">Sort Salary Desc</button>

<h2>All Employees</h2>
<button onclick="loadEmployees()">Load All</button>

<ul id="list"></ul>

<script>
const BASE_URL = "http://localhost:8082";

function addEmployee() {
    const emp = {
        id: document.getElementById("id").value,
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        mobile: document.getElementById("mobile").value,
        city: document.getElementById("city").value,
        salary: document.getElementById("salary").value
    };

    fetch(BASE_URL + "/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(emp)
    }).then(() => loadEmployees());
}

function loadEmployees() {
    fetch(BASE_URL + "/display")
        .then(res => res.json())
        .then(data => display(data));
}

function searchByName() {
    const name = document.getElementById("searchName").value;
    fetch(BASE_URL + "/search/" + name)
        .then(res => res.json())
        .then(data => display(data));
}

function searchByCity() {
    const city = document.getElementById("searchCity").value;
    fetch(BASE_URL + "/city/" + city)
        .then(res => res.json())
        .then(data => display(data));
}

function sortAsc() {
    fetch(BASE_URL + "/sort/asc")
        .then(res => res.json())
        .then(data => display(data));
}

function sortDesc() {
    fetch(BASE_URL + "/sort/desc")
        .then(res => res.json())
        .then(data => display(data));
}

function display(data) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(emp => {
        const li = document.createElement("li");
        li.innerText = `${emp.id} | ${emp.name} | ${emp.city} | ₹${emp.salary}`;
        list.appendChild(li);
    });
}
</script>

</body>
</html>
